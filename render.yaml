services:
  - type: web
    name: nepali-converter-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: ALLOWED_ORIGINS
        value: "https://nepali-converter-frontend.vercel.app" # REPLACE THIS WITH REAL FRONTEND URL
